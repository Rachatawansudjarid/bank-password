<div class="bank-password-page">
  <section class="form-panel">
    <h2>Bank Password</h2>

    <form class="bank-form" (submit)="$event.preventDefault()">
      <div class="form-row">
        <label for="bankCode">BankCode<span class="required">*</span></label>
        <select id="bankCode" name="bankCode" [(ngModel)]="formModel.bankCode">
          <option *ngFor="let code of bankCodeOptions" [ngValue]="code">{{ code }}</option>
        </select>
      </div>

      <div class="form-row">
        <label for="username">Username<span class="required">*</span></label>
        <input id="username" name="username" type="text" [(ngModel)]="formModel.username" />
      </div>

      <div class="form-row">
        <label for="password1">Password1<span class="required">*</span></label>
        <input id="password1" name="password1" type="password" [(ngModel)]="formModel.password1" />
      </div>

      <div class="form-row">
        <label for="password2">Password2</label>
        <input id="password2" name="password2" type="password" [(ngModel)]="formModel.password2" />
      </div>

      <div class="form-row">
        <label for="activeFrom">ใช้งานตั้งแต่<span class="required">*</span></label>
        <input id="activeFrom" name="activeFrom" type="date" [(ngModel)]="formModel.activeFrom" />
      </div>

      <div class="form-row">
        <label for="activeTo">ใช้งานจนถึง</label>
        <input id="activeTo" name="activeTo" type="date" [(ngModel)]="formModel.activeTo" />
      </div>

      <div class="actions">
        <button type="button" class="btn btn-outline" (click)="clear()">ล้างค่า</button>
        <button type="button" class="btn btn-primary" (click)="save()">บันทึกข้อมูล</button>
      </div>
    </form>
  </section>

  <section class="table-panel">
    <table>
      <thead>
        <tr>
          <th>Bank Code</th>
          <th>แก้ไขล่าสุด</th>
          <th>ใช้งานตั้งแต่</th>
          <th>ใช้งานจนถึง</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of pagedRows">
          <td>{{ row.bankCode }}</td>
          <td>{{ row.updatedAt }}</td>
          <td>{{ row.activeFrom }}</td>
          <td>{{ row.activeTo }}</td>
        </tr>
      </tbody>
    </table>

    <div class="table-footer">
      <div class="page-size">
        <span>PageSize</span>
        <select name="pageSize" [(ngModel)]="pageSize" (ngModelChange)="onPageSizeChange()">
          <option *ngFor="let option of pageSizeOptions" [ngValue]="option">{{ option }}</option>
        </select>
      </div>

      <div class="page-info">แสดง {{ pagedRows.length }} ถึง {{ rows.length }} รายการ</div>

      <div class="pagination">
        <button type="button" (click)="selectPage(currentPage - 1)" [disabled]="currentPage === 1">
          Previous
        </button>
        <button
          type="button"
          *ngFor="let page of pageNumbers"
          [class.active]="page === currentPage"
          (click)="selectPage(page)"
        >
          {{ page }}
        </button>
        <button
          type="button"
          (click)="selectPage(currentPage + 1)"
          [disabled]="currentPage === totalPages"
        >
          Next
        </button>
      </div>
    </div>
  </section>
</div>
